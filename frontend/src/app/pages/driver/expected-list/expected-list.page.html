<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Expected list</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <div class="app-card" *ngFor="let r of rows">
    <div class="row-flex space-between">
      <div>
        <div style="font-weight:700;">{{ r.full_name }}</div>
        <div class="muted-text text-small">{{ r.pickup_name || '—' }}</div>
      </div>
      <app-status-badge [label]="r.status" tone="primary"></app-status-badge>
    </div>
  </div>
  <div class="app-card" *ngIf="rows.length === 0">
    <div class="muted-text">No reservations yet.</div>
  </div>
</ion-content>
