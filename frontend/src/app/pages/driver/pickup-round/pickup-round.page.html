<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Pickup Round</ion-title>
    <ion-buttons slot="end" *ngIf="roundId">
      <ion-button (click)="endRound()" color="danger">End</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="app-card" *ngIf="!roundId">
    <div class="bold">No active round</div>
    <div class="muted-text text-small">Start a round to notify students for today.</div>
    <ion-button expand="block" (click)="startRound()" [disabled]="!busId">
      <ion-icon name="play-outline" slot="start"></ion-icon> Start round
    </ion-button>
  </div>

  <div *ngIf="roundId">
    <div class="grid-3">
      <app-stat-card label="Coming" [value]="yesCount" tone="success" icon="checkmark-circle-outline"></app-stat-card>
      <app-stat-card label="Skipping" [value]="noCount" tone="muted" icon="remove-circle-outline"></app-stat-card>
      <app-stat-card label="Pending" [value]="pendingCount" tone="warning" icon="time-outline"></app-stat-card>
    </div>

    <app-section-header title="Expected students" action="Open scanner" (actionClick)="goScan()"></app-section-header>

    <div class="app-card" *ngFor="let row of expected">
      <div class="row-flex space-between">
        <div>
          <div class="bold">{{ row.full_name }}</div>
          <div class="muted-text text-small">{{ row.pickup_name || 'Pickup not set' }}</div>
        </div>
        <app-status-badge
          [label]="row.response === 'yes' ? 'Coming' : row.response === 'no' ? 'Skipping' : 'Pending'"
          [tone]="row.response === 'yes' ? 'success' : row.response === 'no' ? 'muted' : 'warning'">
        </app-status-badge>
      </div>
    </div>

    <div class="app-card" *ngIf="expected.length === 0 && !loading">
      <div class="muted-text">No reservations yet for this bus this month.</div>
    </div>
  </div>
</ion-content>
