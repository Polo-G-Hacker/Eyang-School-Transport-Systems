version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: ests_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ests
      POSTGRES_PASSWORD: ests_password
      POSTGRES_DB: ests
    ports:
      - "5432:5432"
    volumes:
      - ests_db_data:/var/lib/postgresql/data
      - ./backend/src/db/migrations:/docker-entrypoint-initdb.d:ro

  mailhog:
    image: mailhog/mailhog:latest
    container_name: ests_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

volumes:
  ests_db_data:
